<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-slate-950">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoL Synergy and Profile Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full bg-slate-950 text-white antialiased">
    <header class="fixed inset-x-0 top-0 z-40 border-b border-slate-800/80 bg-slate-950/95 backdrop-blur">
      <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-4 py-3 md:px-6">
        <h1 class="text-base font-extrabold tracking-tight sm:text-lg md:text-xl">
          <span class="bg-gradient-to-r from-cyan-400 via-blue-500 to-sky-400 bg-clip-text text-transparent">LoL Synergy & Profile Tracker</span>
        </h1>
        <nav id="tabs-nav" class="flex flex-wrap gap-2"></nav>
      </div>
    </header>

    <main class="mx-auto w-full max-w-7xl px-4 pb-16 pt-24 md:px-6">
      <section id="aba-perfil"></section>
      <section id="aba-maestria" class="hidden"></section>
      <section id="aba-sinergia" class="hidden"></section>
    </main>

    <div id="mastery-tooltip" class="pointer-events-none fixed z-50 hidden rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-xs text-slate-100 shadow-2xl"></div>

    <script>
      // URL única para centralizar o tráfego de API via Cloudflare Worker.
      const WORKER_URL = 'https://example-worker-url.workers.dev';
      const DDRAGON_VERSION = '14.22.1';
      const TAB_IDS = {
        perfil: 'aba-perfil',
        maestria: 'aba-maestria',
        sinergia: 'aba-sinergia'
      };

      // Estado global centralizado da aplicação.
      window.appState = {
        currentTab: 'perfil',
        searchProfile: {
          loading: false,
          error: null,
          puuid: null,
          gameName: null,
          tagLine: null,
          profileIconId: null,
          summonerLevel: null,
          stats: { wins: 0, losses: 0, winRate: 0 },
          matches: []
        },
        masteryDashboard: {
          loading: false,
          error: null,
          allMasteries: []
        },
        teamPlanner: {
          queueType: 'solo_duo',
          playerCount: 2,
          analysisLoading: false,
          analysisResult: null,
          slots: [
            { id: 1, type: 'anonymous', championSelected: '', searchedData: null, loading: false, error: null, query: '', gameName: '', tagLine: '', suggestions: [], masteryChoices: [] },
            { id: 2, type: 'anonymous', championSelected: '', searchedData: null, loading: false, error: null, query: '', gameName: '', tagLine: '', suggestions: [], masteryChoices: [] },
            { id: 3, type: 'anonymous', championSelected: '', searchedData: null, loading: false, error: null, query: '', gameName: '', tagLine: '', suggestions: [], masteryChoices: [] },
            { id: 4, type: 'anonymous', championSelected: '', searchedData: null, loading: false, error: null, query: '', gameName: '', tagLine: '', suggestions: [], masteryChoices: [] },
            { id: 5, type: 'anonymous', championSelected: '', searchedData: null, loading: false, error: null, query: '', gameName: '', tagLine: '', suggestions: [], masteryChoices: [] }
          ]
        },
        staticData: {
          championsById: {},
          championList: []
        }
      };

      const tooltipEl = document.getElementById('mastery-tooltip');

      const CHAMPION_KEY_OVERRIDES = {
        "Wukong": "MonkeyKing",
        "Cho'Gath": "Chogath",
        "Dr. Mundo": "DrMundo",
        "Nunu & Willump": "Nunu",
        "K'Sante": "KSante",
        "Kai'Sa": "Kaisa",
        "Kha'Zix": "Khazix",
        "Bel'Veth": "Belveth",
        "Rek'Sai": "RekSai",
        "Vel'Koz": "Velkoz",
        "LeBlanc": "Leblanc"
      };

      function setAtPath(obj, path, value) {
        const keys = path.split('.');
        const last = keys.pop();
        const parent = keys.reduce((acc, key) => {
          const numeric = Number(key);
          const parsed = Number.isInteger(numeric) && String(numeric) === key ? numeric : key;
          return acc[parsed];
        }, obj);
        const lastNumeric = Number(last);
        const parsedLast = Number.isInteger(lastNumeric) && String(lastNumeric) === last ? lastNumeric : last;
        parent[parsedLast] = value;
      }

      // Função reativa central: muta estado e dispara renderização.
      function updateState(path, newValue) {
        setAtPath(window.appState, path, newValue);
        renderApp();
      }

      function renderApp() {
        renderTabsNav();
        Object.entries(TAB_IDS).forEach(([tab, sectionId]) => {
          document.getElementById(sectionId).classList.toggle('hidden', tab !== window.appState.currentTab);
        });

        renderProfileTab();
        renderMasteryTab();
        renderSynergyTab();
      }

      function renderTabsNav() {
        const nav = document.getElementById('tabs-nav');
        const tabs = [
          { id: 'perfil', label: 'Perfil Geral' },
          { id: 'maestria', label: 'Maestrias' },
          { id: 'sinergia', label: 'Planejador de Sinergia' }
        ];

        nav.innerHTML = tabs
          .map(({ id, label }) => {
            const active = window.appState.currentTab === id;
            return `
              <button
                data-action="switch-tab"
                data-tab="${id}"
                class="rounded-lg border px-3 py-2 text-sm font-semibold transition ${active ? 'border-blue-500 bg-blue-600 text-white shadow-lg shadow-blue-900/40' : 'border-slate-700 text-slate-300 hover:border-slate-500 hover:text-slate-100'}"
                type="button"
              >${label}</button>
            `;
          })
          .join('');
      }

      function errorBanner(message, action, slotId = '') {
        if (!message) return '';
        const isRateLimit = message.includes('muitas consultas');
        const classes = isRateLimit
          ? 'border-amber-700 bg-amber-950/40 text-amber-300'
          : 'border-red-800 bg-red-950/40 text-red-300';
        const idAttr = slotId ? `data-id="${slotId}"` : '';
        return `
          <div class="mb-4 flex items-start justify-between gap-3 rounded-lg border ${classes} px-4 py-3 text-sm">
            <p>${message}</p>
            <button data-action="${action}" ${idAttr} class="rounded border border-current px-2 py-0.5 text-xs font-semibold hover:opacity-80" type="button">Fechar</button>
          </div>
        `;
      }

      function normalizeWorkerError(status) {
        if (status === 404) {
          return 'Erro: Invocador não encontrado. Verifique a ortografia do nome e se a tag correspondente está correta.';
        }
        if (status === 429) {
          return 'A plataforma está recebendo muitas consultas simultâneas. Por favor, aguarde alguns segundos antes de tentar novamente.';
        }
        return 'Falha crítica amigável: não foi possível completar a operação agora. Tente novamente em instantes.';
      }

      async function workerRequest(action, payload) {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, ...payload })
        });

        if (!response.ok) {
          throw new Error(normalizeWorkerError(response.status));
        }

        return response.json();
      }

      function getChampionIdFromName(name) {
        const normalized = CHAMPION_KEY_OVERRIDES[name] || name?.replace(/[\s'.]/g, '') || '';
        return normalized;
      }

      function championImage(name) {
        const id = getChampionIdFromName(name);
        return `https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/img/champion/${encodeURIComponent(id)}.png`;
      }

      function profileIconImage(id) {
        return `https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/img/profileicon/${id}.png`;
      }

      function itemImage(itemId) {
        return `https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/img/item/${itemId}.png`;
      }

      function calculateKdaRatio(k, d, a) {
        return ((k + a) / Math.max(1, d)).toFixed(2);
      }

      function formatDuration(seconds) {
        const m = Math.floor((seconds || 0) / 60);
        const s = (seconds || 0) % 60;
        return `${m}m ${String(s).padStart(2, '0')}s`;
      }

      function renderProfileTab() {
        const section = document.getElementById('aba-perfil');
        const { searchProfile } = window.appState;
        const hasProfile = Boolean(searchProfile.puuid);
        const winRate = searchProfile.stats.winRate || 0;
        const winColor = winRate >= 50 ? 'bg-blue-500' : 'bg-red-500';

        const matchesHtml = (searchProfile.matches || []).slice(0, 5).map((match) => {
          const isWin = Boolean(match.win);
          const rowClass = isWin ? 'border-blue-800 bg-blue-950/40 text-blue-100' : 'border-red-800 bg-red-950/40 text-red-100';
          const ratio = calculateKdaRatio(match.kills, match.deaths, match.assists);
          const ratioClass = Number(ratio) >= 4 ? 'text-amber-400' : 'text-slate-300';
          const items = [match.item0, match.item1, match.item2, match.item3, match.item4, match.item5, match.item6, match.item7];

          return `
            <article class="mb-3 grid gap-3 rounded-xl border ${rowClass} p-3 md:grid-cols-[70px_1fr_180px_210px] md:items-center">
              <img class="h-16 w-16 rounded-lg border border-slate-700 object-cover" src="${championImage(match.championName || 'Aatrox')}" alt="${match.championName || 'Campeão'}" loading="lazy" />
              <div>
                <p class="font-semibold ${isWin ? 'text-blue-300' : 'text-red-300'}">${isWin ? 'Vitória' : 'Derrota'}</p>
                <p class="text-sm text-slate-300">${formatDuration(match.gameDuration)}</p>
              </div>
              <div>
                <p class="text-base font-semibold text-white">${match.kills} / ${match.deaths} / ${match.assists}</p>
                <p class="text-sm ${ratioClass}">${ratio} KDA</p>
              </div>
              <div class="grid grid-cols-4 gap-1">
                ${items
                  .map((itemId) =>
                    itemId
                      ? `<img class="h-9 w-9 rounded border border-slate-700 bg-slate-800" src="${itemImage(itemId)}" alt="Item ${itemId}" loading="lazy" />`
                      : '<div class="h-9 w-9 rounded border border-slate-700 bg-slate-800"></div>'
                  )
                  .join('')}
              </div>
            </article>
          `;
        }).join('');

        section.innerHTML = `
          <div class="space-y-6">
            <div class="transition-all ${hasProfile ? 'pt-2' : 'flex min-h-[60vh] items-center justify-center'}">
              <form id="profile-form" class="w-full max-w-2xl rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-xl sm:p-5">
                ${errorBanner(searchProfile.error, 'clear-profile-error')}
                <div class="grid gap-2 sm:grid-cols-[1fr_auto_120px_auto] sm:items-center">
                  <input required id="profile-game-name" class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-white placeholder:text-slate-500 focus:border-blue-500 focus:outline-none" placeholder="Faker" value="${searchProfile.gameName || ''}" />
                  <span class="text-center text-slate-400">#</span>
                  <input required id="profile-tag" class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-white placeholder:text-slate-500 focus:border-blue-500 focus:outline-none" placeholder="KR1" value="${searchProfile.tagLine || ''}" />
                  <button ${searchProfile.loading ? 'disabled' : ''} class="inline-flex items-center justify-center rounded-lg bg-blue-600 px-4 py-2 font-semibold text-white transition hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-70" type="submit">
                    ${searchProfile.loading ? '<span class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></span>' : 'Buscar'}
                  </button>
                </div>
              </form>
            </div>

            ${hasProfile ? `
              <div class="grid gap-4 lg:grid-cols-[1.4fr_0.9fr]">
                <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-xl">
                  <div class="flex flex-wrap items-center gap-4 rounded-xl border border-slate-800 bg-slate-950/70 p-3">
                    <img class="h-20 w-20 rounded-xl border border-slate-700" src="${profileIconImage(searchProfile.profileIconId || 29)}" alt="Ícone de invocador" />
                    <div>
                      <h2 class="text-2xl font-bold text-slate-100">${searchProfile.gameName}<span class="ml-2 text-base font-medium text-slate-400">#${searchProfile.tagLine}</span></h2>
                      <span class="mt-2 inline-block rounded-full border border-blue-700 bg-blue-900/40 px-3 py-1 text-xs font-semibold text-blue-300">Nível ${searchProfile.summonerLevel || 0}</span>
                    </div>
                  </div>
                </section>

                <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-xl">
                  <h3 class="mb-2 text-lg font-semibold text-slate-100">Resumo Competitivo</h3>
                  <div class="mb-3 grid grid-cols-2 gap-3 text-center">
                    <div class="rounded-lg border border-slate-700 bg-slate-950/80 p-3"><p class="text-sm text-slate-400">Vitórias</p><p class="text-xl font-bold text-blue-300">${searchProfile.stats.wins}</p></div>
                    <div class="rounded-lg border border-slate-700 bg-slate-950/80 p-3"><p class="text-sm text-slate-400">Derrotas</p><p class="text-xl font-bold text-red-300">${searchProfile.stats.losses}</p></div>
                  </div>
                  <p class="mb-2 text-center text-sm text-slate-200">Win Rate: <span class="font-bold">${winRate.toFixed(1)}%</span></p>
                  <div class="h-3 overflow-hidden rounded-full bg-slate-800">
                    <div class="h-full ${winColor} transition-all" style="width: ${Math.max(0, Math.min(100, winRate))}%"></div>
                  </div>
                </section>
              </div>

              <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-xl">
                <h3 class="mb-3 text-lg font-semibold text-slate-100">Últimas 5 Partidas</h3>
                ${matchesHtml || '<p class="text-sm text-slate-400">Sem histórico recente para exibir.</p>'}
              </section>
            ` : ''}
          </div>
        `;
      }

      function renderMasteryTab() {
        const section = document.getElementById('aba-maestria');
        const { searchProfile, masteryDashboard } = window.appState;

        if (!searchProfile.puuid) {
          section.innerHTML = '<div class="flex min-h-[65vh] items-center justify-center rounded-2xl border border-slate-800 bg-slate-900 p-6 text-center text-slate-300">Por favor, busque um jogador na aba Perfil para visualizar o painel de maestrias</div>';
          return;
        }

        const top10 = masteryDashboard.allMasteries.slice(0, 10);
        const remainder = masteryDashboard.allMasteries.slice(10);
        const maxPoints = top10[0]?.championPoints || 1;

        section.innerHTML = `
          <div class="space-y-4">
            ${errorBanner(masteryDashboard.error, 'clear-mastery-error')}
            ${masteryDashboard.loading ? '<div class="rounded-xl border border-slate-800 bg-slate-900 p-4"><div class="h-6 w-44 animate-pulse rounded bg-slate-700"></div><div class="mt-4 h-24 animate-pulse rounded bg-slate-800"></div></div>' : ''}
            ${top10.length ? `
              <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-xl">
                <h2 class="mb-3 text-xl font-bold text-slate-100">Top 10 Campeões</h2>
                <div class="space-y-3">
                  ${top10.map((entry, index) => {
                    const pct = Math.max(4, Math.round((entry.championPoints / maxPoints) * 100));
                    const gradient = index < 3 ? 'from-amber-500 to-yellow-600' : 'from-blue-500 to-cyan-600';
                    return `
                      <article class="rounded-xl border border-slate-800 bg-slate-950/60 p-3">
                        <div class="mb-2 flex items-center gap-3">
                          <img class="h-12 w-12 rounded-full border-2 border-slate-700 object-cover" src="${championImage(entry.championName)}" alt="${entry.championName}" loading="lazy" />
                          <div class="flex-1">
                            <p class="font-semibold">${entry.championName} <span class="ml-2 rounded bg-slate-800 px-2 py-0.5 text-xs text-slate-300">M${entry.championLevel}</span></p>
                            <p class="text-sm text-slate-400">${Number(entry.championPoints || 0).toLocaleString('pt-BR')} pts</p>
                          </div>
                        </div>
                        <div class="h-2.5 overflow-hidden rounded-full bg-slate-800">
                          <div class="h-full bg-gradient-to-r ${gradient}" style="width:${pct}%"></div>
                        </div>
                      </article>
                    `;
                  }).join('')}
                </div>
              </section>

              <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-xl">
                <h3 class="mb-4 text-lg font-semibold text-slate-100">Distribuição Geral de Campeões</h3>
                <div class="grid grid-cols-8 gap-2 sm:grid-cols-10 lg:grid-cols-14 2xl:grid-cols-16">
                  ${remainder.map((entry) => {
                    const level = entry.championLevel || 1;
                    const tone = level >= 8 ? 'bg-red-700/80' : level >= 6 ? 'bg-orange-600/80' : level >= 4 ? 'bg-blue-700/80' : 'bg-slate-700/80';
                    return `
                      <button
                        data-action="show-tooltip"
                        data-name="${entry.championName}"
                        data-level="${entry.championLevel}"
                        data-points="${entry.championPoints}"
                        class="group relative aspect-square overflow-hidden rounded border border-slate-700 ${tone}"
                        type="button"
                      >
                        <img class="h-full w-full object-cover opacity-85 transition group-hover:opacity-100" src="${championImage(entry.championName)}" alt="${entry.championName}" loading="lazy" />
                      </button>
                    `;
                  }).join('')}
                </div>
              </section>
            ` : '<div class="rounded-2xl border border-slate-800 bg-slate-900 p-6 text-slate-300">Nenhum dado de maestria carregado.</div>'}
          </div>
        `;
      }

      function renderSynergyTab() {
        const section = document.getElementById('aba-sinergia');
        const { teamPlanner } = window.appState;
        const activeSlots = teamPlanner.slots.slice(0, teamPlanner.playerCount);

        section.innerHTML = `
          <div class="space-y-4">
            <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-xl">
              <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                <div>
                  <p class="mb-2 text-sm text-slate-400">Tipo de fila</p>
                  <div class="inline-flex rounded-lg border border-slate-700 p-1">
                    <button type="button" data-action="set-queue" data-queue="solo_duo" class="rounded-md px-3 py-1.5 text-sm font-semibold ${teamPlanner.queueType === 'solo_duo' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:text-white'}">Solo/Duo</button>
                    <button type="button" data-action="set-queue" data-queue="flex" class="rounded-md px-3 py-1.5 text-sm font-semibold ${teamPlanner.queueType === 'flex' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:text-white'}">Fila Flex</button>
                  </div>
                </div>
                <div>
                  <p class="mb-2 text-sm text-slate-400">Quantidade de jogadores</p>
                  <div class="flex flex-wrap gap-2">
                    ${[1,2,3,4,5].map((count) => `<button type="button" data-action="set-player-count" data-count="${count}" class="h-9 w-9 rounded-full border text-sm font-bold transition ${teamPlanner.playerCount === count ? 'border-cyan-500 bg-cyan-600 text-white' : 'border-slate-700 text-slate-300 hover:border-slate-500'}">${count}</button>`).join('')}
                  </div>
                </div>
              </div>
            </section>

            <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-xl">
              <div class="grid gap-3" style="grid-template-columns: repeat(${teamPlanner.playerCount}, minmax(0, 1fr));">
                ${activeSlots.map((slot, index) => `
                  <article class="relative rounded-xl border border-slate-800 bg-slate-950/70 p-3">
                    <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
                      <h3 class="text-sm font-semibold text-slate-200">Slot ${index + 1}</h3>
                      <div class="inline-flex rounded-md border border-slate-700 p-1 text-xs">
                        <button type="button" data-action="set-slot-type" data-id="${slot.id}" data-type="anonymous" class="rounded px-2 py-1 ${slot.type === 'anonymous' ? 'bg-blue-600 text-white' : 'text-slate-300'}">Jogador Anônimo</button>
                        <button type="button" data-action="set-slot-type" data-id="${slot.id}" data-type="profile" class="rounded px-2 py-1 ${slot.type === 'profile' ? 'bg-blue-600 text-white' : 'text-slate-300'}">Buscar Perfil</button>
                      </div>
                    </div>
                    ${slot.error ? errorBanner(slot.error, 'clear-slot-error', slot.id) : ''}

                    ${slot.loading ? `
                      <div class="space-y-2">
                        <div class="h-8 animate-pulse rounded bg-slate-800"></div>
                        <div class="h-24 animate-pulse rounded bg-slate-800"></div>
                      </div>
                    ` : slot.type === 'anonymous' ? `
                      <div class="space-y-2">
                        <input data-action="slot-query" data-id="${slot.id}" class="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-white placeholder:text-slate-500" placeholder="Digite um campeão" value="${slot.query || ''}" />
                        ${slot.suggestions.length ? `
                          <div class="max-h-40 overflow-y-auto rounded-lg border border-slate-700 bg-slate-900">
                            ${slot.suggestions.slice(0, 8).map((name) => `
                              <button type="button" data-action="slot-select-suggestion" data-id="${slot.id}" data-name="${name}" class="flex w-full items-center gap-2 px-2 py-1.5 text-left text-sm text-slate-200 hover:bg-slate-800">
                                <img src="${championImage(name)}" class="h-6 w-6 rounded" alt="${name}" loading="lazy" />
                                ${name}
                              </button>
                            `).join('')}
                          </div>
                        ` : ''}
                        ${slot.championSelected ? `<div class="rounded-lg border border-cyan-700 bg-cyan-950/30 p-2 text-center"><img class="mx-auto h-16 w-16 rounded-lg" src="${championImage(slot.championSelected)}" alt="${slot.championSelected}" loading="lazy" /><p class="mt-2 text-sm font-semibold text-cyan-300">${slot.championSelected}</p></div>` : ''}
                      </div>
                    ` : `
                      <div class="space-y-2">
                        ${slot.searchedData ? `
                          <div class="rounded-lg border border-slate-700 bg-slate-900 p-2">
                            <p class="mb-2 text-xs text-slate-400">Top 10 maestrias (clique para travar campeão)</p>
                            <div class="space-y-1">
                              ${slot.masteryChoices.map((entry) => `
                                <button type="button" data-action="slot-select-mastery" data-id="${slot.id}" data-name="${entry.championName}" class="flex w-full items-center justify-between rounded border border-slate-700 px-2 py-1 text-xs hover:border-blue-500 hover:bg-slate-800">
                                  <span class="flex items-center gap-2"><img class="h-5 w-5 rounded" src="${championImage(entry.championName)}" alt="${entry.championName}" loading="lazy" />${entry.championName}</span>
                                  <span class="text-slate-400">M${entry.championLevel}</span>
                                </button>
                              `).join('')}
                            </div>
                          </div>
                          <button type="button" data-action="slot-clear" data-id="${slot.id}" class="w-full rounded-lg border border-slate-700 py-2 text-xs font-semibold text-slate-200 hover:border-slate-500">Limpar/Trocar</button>
                          ${slot.championSelected ? `<p class="rounded border border-blue-700 bg-blue-950/30 px-2 py-1 text-xs text-blue-300">Selecionado: ${slot.championSelected}</p>` : ''}
                        ` : `
                          <div class="grid grid-cols-[1fr_auto_80px_auto] items-center gap-2">
                            <input data-action="slot-game-name" data-id="${slot.id}" class="rounded border border-slate-700 bg-slate-900 px-2 py-1.5 text-xs" placeholder="Nome" value="${slot.gameName || ''}" />
                            <span class="text-slate-500">#</span>
                            <input data-action="slot-tag" data-id="${slot.id}" class="rounded border border-slate-700 bg-slate-900 px-2 py-1.5 text-xs" placeholder="Tag" value="${slot.tagLine || ''}" />
                            <button type="button" data-action="slot-fetch" data-id="${slot.id}" class="rounded bg-blue-600 px-2 py-1.5 text-xs font-semibold">Puxar</button>
                          </div>
                        `}
                      </div>
                    `}
                  </article>
                `).join('')}
              </div>
            </section>

            <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-xl">
              <h3 class="mb-3 text-lg font-semibold text-slate-100">Analisador de Sinergia de Equipe</h3>
              <button type="button" data-action="analyze-composition" class="mx-auto flex w-full max-w-md items-center justify-center rounded-xl bg-gradient-to-r from-blue-600 to-cyan-600 px-4 py-3 text-sm font-bold text-white transition hover:scale-[1.01] hover:from-blue-500 hover:to-cyan-500">Analisar Composição de Equipe</button>
              ${teamPlanner.analysisLoading ? '<div class="mt-4 space-y-2"><div class="h-2 w-full animate-pulse rounded-full bg-slate-700"></div><div class="h-2 w-4/5 animate-pulse rounded-full bg-slate-700"></div></div>' : ''}
              ${teamPlanner.analysisResult ? renderAnalysisResult(teamPlanner.analysisResult) : ''}
            </section>
          </div>
        `;
      }

      function renderAnalysisResult(result) {
        const bars = [
          { label: 'Equilíbrio de Dano (AD/AP)', value: result.metrics.damageBalance, color: 'bg-blue-500' },
          { label: 'Índice de Controle de Grupo (CC Score)', value: result.metrics.ccScore, color: 'bg-cyan-500' },
          { label: 'Consistência de Linha de Frente', value: result.metrics.frontline, color: 'bg-amber-500' },
          { label: 'Pressão de Rota e Transição', value: result.metrics.tempo, color: 'bg-purple-500' }
        ];

        return `
          <div class="mt-4 grid gap-4 lg:grid-cols-[180px_1fr]">
            <div class="flex flex-col items-center justify-center rounded-xl border border-slate-700 bg-slate-950/60 p-4">
              <div class="flex h-24 w-24 items-center justify-center rounded-full border-2 border-cyan-500 bg-cyan-950/30 text-4xl font-black text-cyan-300 shadow-lg shadow-cyan-900/30">${result.grade}</div>
              <p class="mt-2 text-xs text-slate-400">Nota da composição</p>
            </div>
            <div class="space-y-3 rounded-xl border border-slate-700 bg-slate-950/50 p-4">
              ${bars.map((bar) => `
                <div>
                  <div class="mb-1 flex items-center justify-between text-xs text-slate-300"><span>${bar.label}</span><span>${bar.value}%</span></div>
                  <div class="h-2 rounded-full bg-slate-800"><div class="h-full rounded-full ${bar.color}" style="width:${bar.value}%"></div></div>
                </div>
              `).join('')}
            </div>
          </div>
          <blockquote class="mt-4 rounded-xl border-l-4 border-blue-500 bg-slate-950/70 px-4 py-3 text-sm text-slate-200">${result.coach}</blockquote>
        `;
      }

      function getSelectedChampions() {
        return window.appState.teamPlanner.slots
          .slice(0, window.appState.teamPlanner.playerCount)
          .map((slot) => slot.championSelected)
          .filter(Boolean);
      }

      function generateCompositionAnalysis(champions) {
        const uniqueCount = new Set(champions).size;
        const hasDuplicates = uniqueCount < champions.length;
        const completeness = Math.round((champions.length / window.appState.teamPlanner.playerCount) * 100);

        const championMeta = champions
          .map((name) => window.appState.staticData.championList.find((c) => c.name === name))
          .filter(Boolean);

        const tags = championMeta.flatMap((c) => c.tags || []);
        const adLike = tags.filter((tag) => ['Fighter', 'Marksman', 'Assassin'].includes(tag)).length;
        const apLike = tags.filter((tag) => ['Mage', 'Support'].includes(tag)).length;
        const ccLike = tags.filter((tag) => ['Tank', 'Support'].includes(tag)).length;
        const frontlineLike = tags.filter((tag) => ['Tank', 'Fighter'].includes(tag)).length;

        const totalTagBase = Math.max(1, tags.length);
        const damageBalance = 100 - Math.min(100, Math.abs(adLike - apLike) * 18);
        const ccScore = Math.min(100, Math.round((ccLike / totalTagBase) * 100) + 25);
        const frontline = Math.min(100, Math.round((frontlineLike / totalTagBase) * 100) + 20);
        const tempo = Math.max(20, Math.min(100, 60 + (champions.length * 6) - (hasDuplicates ? 25 : 0)));

        let grade = 'E';
        if (completeness >= 100 && !hasDuplicates) grade = 'S';
        else if (completeness >= 80 && !hasDuplicates) grade = 'A';
        else if (completeness >= 60) grade = 'B';
        else if (completeness >= 40) grade = 'C';
        else grade = 'D';

        let coach = 'A composição ainda está em fase inicial. Complete mais slots para uma leitura tática mais precisa.';
        if (champions.includes('Yasuo') && champions.includes('Malphite')) {
          coach = 'Ótima sinergia de combo de controle de grupo detectada entre Malphite e Yasuo. Sua composição possui alta capacidade de iniciação em lutas de equipe através do Ultimate.';
        } else if (hasDuplicates) {
          coach = 'Foram detectados campeões repetidos. Isso pode reduzir a versatilidade tática e facilitar a resposta inimiga durante o draft.';
        } else if (frontline < 45) {
          coach = 'A linha de frente está frágil. Considere adicionar um iniciador ou tanque para criar espaço seguro para seus carregadores.';
        } else if (damageBalance < 45) {
          coach = 'A distribuição de dano está desequilibrada. Misturar fontes AD e AP dificultará a itemização defensiva adversária.';
        } else {
          coach = 'Composição equilibrada e com boa leitura macro. Ajustes finos no controle de visão e ordem de objetivos podem elevar o desempenho competitivo.';
        }

        return {
          grade,
          metrics: {
            damageBalance,
            ccScore,
            frontline,
            tempo
          },
          coach
        };
      }

      async function handleProfileSearch(event) {
        event.preventDefault();
        const gameName = document.getElementById('profile-game-name')?.value?.trim();
        const tagLine = document.getElementById('profile-tag')?.value?.trim();
        if (!gameName || !tagLine) return;

        updateState('searchProfile.loading', true);
        updateState('searchProfile.error', null);
        updateState('searchProfile.gameName', gameName);
        updateState('searchProfile.tagLine', tagLine);

        try {
          const data = await workerRequest('profile_overview', { gameName, tagLine });

          updateState('searchProfile.puuid', data.puuid || null);
          updateState('searchProfile.profileIconId', data.profileIconId || 29);
          updateState('searchProfile.summonerLevel', data.summonerLevel || 0);
          updateState('searchProfile.stats', {
            wins: Number(data.stats?.wins || 0),
            losses: Number(data.stats?.losses || 0),
            winRate: Number(data.stats?.winRate || 0)
          });
          updateState('searchProfile.matches', Array.isArray(data.matches) ? data.matches.slice(0, 5) : []);

          updateState('masteryDashboard.loading', true);
          updateState('masteryDashboard.error', null);
          const masteryData = await workerRequest('masteries', { puuid: data.puuid, gameName, tagLine });
          updateState('masteryDashboard.allMasteries', (masteryData.masteries || []).map(normalizeMasteryEntry));
        } catch (error) {
          updateState('searchProfile.error', error.message || 'Falha ao buscar perfil.');
        } finally {
          updateState('searchProfile.loading', false);
          updateState('masteryDashboard.loading', false);
        }
      }

      function normalizeMasteryEntry(entry) {
        if (!entry) return { championName: 'Aatrox', championLevel: 1, championPoints: 0 };
        const fromStatic = window.appState.staticData.championList.find((champ) => Number(champ.key) === Number(entry.championId));
        const championName = entry.championName || fromStatic?.name || 'Aatrox';
        return {
          championName,
          championLevel: Number(entry.championLevel || 1),
          championPoints: Number(entry.championPoints || 0)
        };
      }

      async function handleSlotFetch(slotId) {
        const slotIndex = window.appState.teamPlanner.slots.findIndex((s) => s.id === slotId);
        if (slotIndex < 0) return;
        const slot = window.appState.teamPlanner.slots[slotIndex];

        if (!slot.gameName?.trim() || !slot.tagLine?.trim()) {
          updateState(`teamPlanner.slots.${slotIndex}.error`, 'Preencha nome e tag para buscar o perfil.');
          return;
        }

        updateState(`teamPlanner.slots.${slotIndex}.loading`, true);
        updateState(`teamPlanner.slots.${slotIndex}.error`, null);

        try {
          const data = await workerRequest('masteries', {
            gameName: slot.gameName.trim(),
            tagLine: slot.tagLine.trim()
          });

          const topMasteries = (data.masteries || []).map(normalizeMasteryEntry).slice(0, 10);
          updateState(`teamPlanner.slots.${slotIndex}.searchedData`, data);
          updateState(`teamPlanner.slots.${slotIndex}.masteryChoices`, topMasteries);
        } catch (error) {
          updateState(`teamPlanner.slots.${slotIndex}.error`, error.message || 'Falha ao buscar maestrias.');
        } finally {
          updateState(`teamPlanner.slots.${slotIndex}.loading`, false);
        }
      }

      function filterChampionSuggestions(query) {
        if (!query) return [];
        const lower = query.toLowerCase();
        return window.appState.staticData.championList
          .filter((champion) => champion.name.toLowerCase().includes(lower))
          .map((champion) => champion.name);
      }

      async function loadChampionStaticData() {
        try {
          const response = await fetch(`https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/data/en_US/champion.json`);
          const json = await response.json();
          const entries = Object.values(json.data || {});
          updateState('staticData.championList', entries);
          updateState('staticData.championsById', Object.fromEntries(entries.map((champ) => [champ.key, champ])));
        } catch {
          updateState('staticData.championList', []);
          updateState('staticData.championsById', {});
        }
      }

      document.addEventListener('submit', (event) => {
        if (event.target.id === 'profile-form') {
          handleProfileSearch(event);
        }
      });

      document.addEventListener('click', (event) => {
        const target = event.target.closest('[data-action]');
        if (!target) return;

        const action = target.dataset.action;

        if (action === 'switch-tab') {
          updateState('currentTab', target.dataset.tab);
          return;
        }

        if (action === 'clear-profile-error') {
          updateState('searchProfile.error', null);
          return;
        }

        if (action === 'clear-mastery-error') {
          updateState('masteryDashboard.error', null);
          return;
        }

        if (action === 'set-queue') {
          updateState('teamPlanner.queueType', target.dataset.queue);
          return;
        }

        if (action === 'set-player-count') {
          updateState('teamPlanner.playerCount', Number(target.dataset.count));
          return;
        }

        if (action === 'set-slot-type') {
          const slotIndex = window.appState.teamPlanner.slots.findIndex((s) => s.id === Number(target.dataset.id));
          if (slotIndex < 0) return;
          updateState(`teamPlanner.slots.${slotIndex}.type`, target.dataset.type);
          updateState(`teamPlanner.slots.${slotIndex}.error`, null);
          return;
        }

        if (action === 'slot-select-suggestion') {
          const slotIndex = window.appState.teamPlanner.slots.findIndex((s) => s.id === Number(target.dataset.id));
          if (slotIndex < 0) return;
          updateState(`teamPlanner.slots.${slotIndex}.championSelected`, target.dataset.name);
          updateState(`teamPlanner.slots.${slotIndex}.query`, target.dataset.name);
          updateState(`teamPlanner.slots.${slotIndex}.suggestions`, []);
          return;
        }

        if (action === 'slot-fetch') {
          handleSlotFetch(Number(target.dataset.id));
          return;
        }

        if (action === 'slot-select-mastery') {
          const slotIndex = window.appState.teamPlanner.slots.findIndex((s) => s.id === Number(target.dataset.id));
          if (slotIndex < 0) return;
          updateState(`teamPlanner.slots.${slotIndex}.championSelected`, target.dataset.name);
          return;
        }

        if (action === 'slot-clear') {
          const slotIndex = window.appState.teamPlanner.slots.findIndex((s) => s.id === Number(target.dataset.id));
          if (slotIndex < 0) return;
          const base = { championSelected: '', searchedData: null, error: null, masteryChoices: [], gameName: '', tagLine: '', loading: false };
          Object.entries(base).forEach(([key, value]) => updateState(`teamPlanner.slots.${slotIndex}.${key}`, value));
          return;
        }

        if (action === 'analyze-composition') {
          const champions = getSelectedChampions();
          updateState('teamPlanner.analysisLoading', true);
          updateState('teamPlanner.analysisResult', null);

          setTimeout(() => {
            const result = generateCompositionAnalysis(champions);
            updateState('teamPlanner.analysisResult', result);
            updateState('teamPlanner.analysisLoading', false);
          }, 2000);
          return;
        }

        if (action === 'clear-slot-error') {
          const slotId = Number(target.dataset.id);
          const slotIndex = window.appState.teamPlanner.slots.findIndex((s) => s.id === slotId);
          if (slotIndex >= 0) updateState(`teamPlanner.slots.${slotIndex}.error`, null);
        }
      });

      document.addEventListener('input', (event) => {
        const target = event.target;
        const action = target.dataset.action;
        if (!action) return;

        if (action === 'slot-query') {
          const slotIndex = window.appState.teamPlanner.slots.findIndex((s) => s.id === Number(target.dataset.id));
          if (slotIndex < 0) return;
          const query = target.value;
          updateState(`teamPlanner.slots.${slotIndex}.query`, query);
          updateState(`teamPlanner.slots.${slotIndex}.suggestions`, filterChampionSuggestions(query));
          return;
        }

        if (action === 'slot-game-name') {
          const slotIndex = window.appState.teamPlanner.slots.findIndex((s) => s.id === Number(target.dataset.id));
          if (slotIndex >= 0) updateState(`teamPlanner.slots.${slotIndex}.gameName`, target.value);
          return;
        }

        if (action === 'slot-tag') {
          const slotIndex = window.appState.teamPlanner.slots.findIndex((s) => s.id === Number(target.dataset.id));
          if (slotIndex >= 0) updateState(`teamPlanner.slots.${slotIndex}.tagLine`, target.value);
        }
      });

      document.addEventListener('mouseover', (event) => {
        const target = event.target.closest('[data-action="show-tooltip"]');
        if (!target) return;
        tooltipEl.innerHTML = `
          <p class="font-semibold text-slate-100">${target.dataset.name}</p>
          <p>Nível de Maestria: <span class="text-amber-400">M${target.dataset.level}</span></p>
          <p>Pontos: ${Number(target.dataset.points || 0).toLocaleString('pt-BR')}</p>
        `;
        tooltipEl.classList.remove('hidden');
      });

      document.addEventListener('mousemove', (event) => {
        if (tooltipEl.classList.contains('hidden')) return;
        tooltipEl.style.left = `${event.clientX + 14}px`;
        tooltipEl.style.top = `${event.clientY + 12}px`;
      });

      document.addEventListener('mouseout', (event) => {
        if (event.target.closest('[data-action="show-tooltip"]')) {
          tooltipEl.classList.add('hidden');
        }
      });

      renderApp();
      loadChampionStaticData();
    </script>
  </body>
</html>

name: Relatorio Tribo Discord

on:
  schedule:
    - cron: '0 22 * * *'    # semanal → todo dia 19:00 Brasília (UTC-3), últimos 7 dias
    - cron: '0 22 * * 5'    # mensal  → toda sexta 19:00 BRT, últimos 30 dias
  workflow_dispatch:
    inputs:
      periodo:
        description: 'Janela de análise'
        type: choice
        options:
          - semanal  # últimos 7 dias
          - mensal   # últimos 30 dias
          - '50'     # últimas 50 partidas por jogador
          - todos    # todo o histórico
        default: semanal
      puuids:
        description: 'Alvo: vazio = premium | puuids (vírgula) | Nome#Tag exato (ex: UGA Fulano#2109) | prefixo de nick (ex: UGA)'
        default: ''

jobs:
  relatorio:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Descobre o período a partir de QUAL cron disparou (ou do input manual).
      # Na sexta os dois crons batem 22:00 UTC → o Actions dispara o workflow duas
      # vezes (uma por schedule), então saem semanal E mensal.
      - name: Definir periodo
        id: periodo
        run: |
          if [ -n "${{ github.event.inputs.periodo }}" ]; then
            echo "valor=${{ github.event.inputs.periodo }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "0 22 * * 5") echo "valor=mensal"  >> "$GITHUB_OUTPUT" ;;
              *)            echo "valor=semanal" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Enviar relatorio
        run: node cron/relatorio-discord.js
        env:
          PERIODO: ${{ steps.periodo.outputs.valor }}
          PUUIDS: ${{ github.event.inputs.puuids }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USER_MAP: ${{ secrets.DISCORD_USER_MAP }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
